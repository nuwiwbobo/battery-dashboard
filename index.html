<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battery Cell Monitoring Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Battery Cell Monitoring Dashboard</h1>
    <button id="reset-btn" type="button">Reset All</button>
  </header>

  <section id="config-panel">
    <h2>Configuration</h2>
    <div class="config-grid">
      <label>
        Capacity profile
        <select id="config-profile">
          <option value="RSS">RSS</option>
          <option value="TSS/ER">TSS/ER</option>
        </select>
      </label>
      <div class="config-info">
        Over-current threshold: <strong id="oc-threshold">60 A</strong> (capacity / 5)
      </div>
    </div>
  </section>

  <section id="cell-table-section">
    <h2>Cell Measurements</h2>
    <div class="table-wrapper">
      <table id="cell-table">
        <thead>
          <tr>
            <th><input type="checkbox" id="select-all"></th>
            <th>#</th>
            <th>Cell V (V)</th>
            <th>IR</th>
            <th>Unit</th>
            <th>V_ripple (V rms)</th>
            <th>I_ripple (A rms)</th>
            <th>P (W)</th>
            <th>ΔT (°C)</th>
            <th>Over Current</th>
            <th>Temp Check</th>
            <th>V_dev (V)</th>
            <th>V Status</th>
          </tr>
        </thead>
        <tbody id="cell-tbody"></tbody>
      </table>
    </div>
    <div class="actions">
      <button type="button" id="add-row-btn">+ Add row</button>
      <button type="button" id="delete-selected-btn">Delete selected</button>
    </div>
  </section>

  <footer id="summary">
    <span>Mean V: <strong id="mean-v">—</strong></span>
    <span>Aman: <strong id="count-aman">0</strong></span>
    <span>Cek: <strong id="count-cek">0</strong></span>
    <span>Ganti: <strong id="count-ganti">0</strong></span>
  </footer>

  <div id="banner" hidden></div>

  <script src="app.js"></script>
</body>
</html>
