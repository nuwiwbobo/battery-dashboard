<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battery Cell Monitoring Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Battery Cell Monitoring Dashboard</h1>
    <div class="header-right">
      <button id="download-db-btn" type="button" class="sync-btn">📥 Download</button>
      <button id="upload-db-btn" type="button" class="sync-btn">📤 Upload</button>
      <span id="sync-status">Idle</span>
      <button id="reset-btn" type="button">Reset All</button>
    </div>
  </header>

  <section id="districts-section">
    <h2>Districts</h2>
    <div id="districts-container"></div>
    <div class="actions">
      <button type="button" id="add-district-btn">+ New district</button>
    </div>
  </section>

  <div id="banner" hidden></div>

  <script src="app.js?v=13"></script>
</body>
</html>
